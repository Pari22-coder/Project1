<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLYER DESIGN</title>
    <style>
    
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;

        }

        nav {
            color: white;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            gap: 17px;
            background-image: linear-gradient(to right, #a85cf9, rgb(255, 126, 219), #470782, #4d0b86);
        }

        .logo {
            font-family: Dancing Script, cursive;
            font-size: 20px;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            gap: 17px;
        }

        nav ul li {
            color: rgb(252, 247, 247);
            list-style-type: none;
        }

        .skills {
            background-image: linear-gradient(to right, #e9a0fb, #f8c7ef);
            min-height: 100vh;
            padding: 50px 0px;
            background-color: rgb(197, 128, 197);
            display: grid;
            justify-content: center;
            gap: 30px;
        }

        .tittle {

            text-align: center;
            font-size: 50px;
            font-family: Dancing Script;
            margin-bottom: 0px;
            color: #95469e;
            font-weight: 5000px;
        }

        .image {
            width: 350px;
            height: 500px;
            border: 4px solid #fffdff;

            border-radius: 30px;
            display: flex;
            justify-content: flex-start;
            align-items: center;



        }

        .posters {
            display: flex;
            gap: 40px;
            /* space between posters */
            justify-content: center;
            align-items: flex-start;
        }

        .butt {
            background-image: linear-gradient(to right, #e9a0fb);
            padding: 10px 20px;



            border: 1px solid#fdf9fb;
            border-radius: 20px;
            cursor: pointer;
            font-size: 30px;
            color: #95469e;
            box-shadow: 3px 3px 3px 3px rgb(193, 119, 210);
            ;
            font-family: Dancing Script, cursive;

            transition:
                transform 0.3s ease,
                box-shadow 0.3s ease,
                background-position 0.4s ease;
            margin-top: 40;
        }
    </style>
</head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Birthstone&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Dancing+Script:wght@400..700&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
<body>
    <nav>
        <div class="logo">
            Pari's Portfolio
        </div>
        <ul>
              <a href="index.html">
                <li>Home</li>
            </a>
            <a href="index.html#about-me">
                <li>About</li><a href=""></a>
                <a href="index.html#skills">
                    <li>Services</li>
                </a>
                <a href="index.html#contacts">
                    <li>Contact</li>
                </a>
        </ul>
    </nav>
    <section class="skills">

        <div class="text">
            <h1 class="tittle">Flyer Designs💥</h1>
        </div>
        <div class="posters">
            <img src="coffe.jpeg" alt="Fyler image" class="image">
            <img src="fanta.jpeg" alt="flyer image" class="image">
            <img src="Cup Cake.png" alt=" Flyer image" class="image">

        </div>
        </div>
        <a href="index.html#skills"> <button class="butt">Back</button></a>

        </div>
    
</body>
</html>
